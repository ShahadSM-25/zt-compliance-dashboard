version: "3.9"
# =============================================================================
# HealthComply — Unified Docker Compose
# =============================================================================
# Runs both the zt-compliance-dashboard (Frontend + API) and the
# cloud-compliance-automation (Compliance Engine + Testbed) together.
#
# ── للتجربة المحلية (بدون Node Exporter / Prometheus) ──────────────────────
#   docker compose up --build
#
# ── للتجربة الكاملة مع مراقبة OS (Node Exporter + Prometheus) ──────────────
#   docker compose --profile monitoring up --build
#
# The dashboard will be available at http://localhost:3000
# Prometheus (if enabled) will be available at http://localhost:9090
# =============================================================================

services:

  # ── Dashboard (Frontend + Backend API) ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthcomply_dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # ── Engine Integration ──────────────────────────────────────────────
      COMPLIANCE_ENGINE_PATH: /engine
      USE_REAL_ENGINE: "true"
      # ── Database ────────────────────────────────────────────────────────
      DATABASE_URL: mysql://healthcomply:healthcomply_pass@mysql:3306/healthcomply
      # ── Node Exporter (اتركها فارغة عند التجربة المحلية) ────────────────
      # NODE_EXPORTER_URL: http://node-exporter:9100
      # ── Auth ────────────────────────────────────────────────────────────
      # MANUS_OAUTH_CLIENT_ID: your_client_id
      # MANUS_OAUTH_CLIENT_SECRET: your_client_secret
    volumes:
      - ../cloud-compliance-automation:/engine:rw
      - compliance_evidence:/engine/evidence
    networks:
      - healthcomply_net
    depends_on:
      mysql:
        condition: service_healthy

  # ── MySQL Database ─────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: healthcomply_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: healthcomply
      MYSQL_USER: healthcomply
      MYSQL_PASSWORD: healthcomply_pass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcomply_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "healthcomply", "-phealthcomply_pass"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── HIS Mock Application (Testbed) ────────────────────────────────────────
  his-mock:
    build:
      context: ../cloud-compliance-automation/testbed/his_mock
      dockerfile: Dockerfile
    container_name: healthcomply_his_mock
    restart: unless-stopped
    environment:
      SECRET_KEY: "dev-secret-key-change-in-production"
      ENVIRONMENT: "development"
      RBAC_ENABLED: "true"
      AUDIT_ENABLED: "true"
      MFA_REQUIRED: "true"
      SESSION_TIMEOUT_MINUTES: "15"
      EVIDENCE_DIR: "/evidence/runtime"
    volumes:
      - compliance_evidence:/evidence
    networks:
      - healthcomply_net

  # ── Nginx Reverse Proxy (for HIS Mock) ────────────────────────────────────
  nginx:
    build:
      context: ../cloud-compliance-automation/testbed/nginx
      dockerfile: Dockerfile
    container_name: healthcomply_nginx
    restart: unless-stopped
    volumes:
      - ../cloud-compliance-automation/testbed/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../cloud-compliance-automation/testbed/certs:/etc/nginx/certs:ro
    ports:
      - "8080:8080"
      - "8443:443"
    networks:
      - healthcomply_net
    depends_on:
      - his-mock

  # ── Node Exporter ─────────────────────────────────────────────────────────
  # ⚠️  معطّل افتراضياً — لا يعمل إلا عند إضافة --profile monitoring
  # متى تحتاجينه؟ فقط عند الاتصال بسيرفر حقيقي (OCI) لجمع مقاييس OS.
  # لتفعيله:   docker compose --profile monitoring up --build
  # لتعطيله:   docker compose up --build  (بدون --profile monitoring)
  node-exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:latest
    container_name: healthcomply_node_exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - healthcomply_net

  # ── Prometheus ────────────────────────────────────────────────────────────
  # ⚠️  معطّل افتراضياً — يعمل مع Node Exporter فقط عند --profile monitoring
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: healthcomply_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - healthcomply_net
    depends_on:
      - node-exporter

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  healthcomply_net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
  compliance_evidence:
  prometheus_data:
